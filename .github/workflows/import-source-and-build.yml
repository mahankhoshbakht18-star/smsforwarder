name: Import Source and Build APK

on:
  push:
    branches: [ main ]
    paths:
      - "SMSForwardManager-GitHub-Repository-Ready.zip"
      - ".github/workflows/import-source-and-build.yml"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: smsforwarder-import-build
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Verify source archive
        shell: bash
        run: |
          set -euo pipefail
          test -f SMSForwardManager-GitHub-Repository-Ready.zip
          echo "Uploaded archive SHA-256:"
          sha256sum SMSForwardManager-GitHub-Repository-Ready.zip
          unzip -tq SMSForwardManager-GitHub-Repository-Ready.zip

      - name: Extract source into runner workspace
        shell: bash
        run: |
          set -euo pipefail
          IMPORT_ROOT="${RUNNER_TEMP}/smsforward-source"
          rm -rf "$IMPORT_ROOT"
          mkdir -p "$IMPORT_ROOT"
          unzip -q SMSForwardManager-GitHub-Repository-Ready.zip -d "$IMPORT_ROOT"

          SETTINGS_FILE="$(find "$IMPORT_ROOT" -mindepth 1 -maxdepth 4 -type f -name settings.gradle.kts -print -quit)"
          test -n "$SETTINGS_FILE"
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"

          test -f "$PROJECT_DIR/settings.gradle.kts"
          test -f "$PROJECT_DIR/gradlew"
          test -f "$PROJECT_DIR/app/build.gradle.kts"

          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project root: $PROJECT_DIR"
          ls -lah "$PROJECT_DIR"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK API 35
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          test -n "$SDKMANAGER"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          chmod +x gradlew
          sha256sum gradle/wrapper/gradle-wrapper.jar
          ./gradlew --version

      - name: Build installable debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon --stacktrace clean :app:assembleDebug 2>&1 | tee "${RUNNER_TEMP}/gradle-build.log"

      - name: Run Android unit tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest 2>&1 | tee "${RUNNER_TEMP}/gradle-tests.log"

      - name: Prepare APK delivery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p delivery
          cp "$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk" delivery/SMSForwardManager-2.5.1-MahanBot-debug.apk
          sha256sum delivery/*.apk > delivery/SHA256SUMS.txt
          ls -lah delivery

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-2.5.1-installable-apk
          path: delivery/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-build-diagnostics
          path: |
            ${{ runner.temp }}/gradle-build.log
            ${{ runner.temp }}/gradle-tests.log
          if-no-files-found: ignore
          retention-days: 7
