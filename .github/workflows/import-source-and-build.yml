name: Import Source and Build APK

on:
  push:
    branches: [ main ]
    paths:
      - "SMSForwardManager-GitHub-Repository-Ready.zip"
      - ".github/workflows/import-source-and-build.yml"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smsforwarder-import-build
  cancel-in-progress: false

jobs:
  build-apk:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source archive
        shell: bash
        run: |
          set -euo pipefail
          test -f SMSForwardManager-GitHub-Repository-Ready.zip
          sha256sum SMSForwardManager-GitHub-Repository-Ready.zip
          unzip -tq SMSForwardManager-GitHub-Repository-Ready.zip

      - name: Extract source into runner workspace
        shell: bash
        run: |
          set -euo pipefail
          IMPORT_ROOT="${RUNNER_TEMP}/smsforward-source"
          rm -rf "$IMPORT_ROOT"
          mkdir -p "$IMPORT_ROOT"
          unzip -q SMSForwardManager-GitHub-Repository-Ready.zip -d "$IMPORT_ROOT"

          SETTINGS_FILE="$(find "$IMPORT_ROOT" -mindepth 1 -maxdepth 5 -type f -name settings.gradle.kts -print -quit)"
          test -n "$SETTINGS_FILE"
          PROJECT_DIR="$(dirname "$SETTINGS_FILE")"
          test -f "$PROJECT_DIR/gradlew"
          test -f "$PROJECT_DIR/app/build.gradle.kts"
          echo "PROJECT_DIR=$PROJECT_DIR" >> "$GITHUB_ENV"
          echo "Project root: $PROJECT_DIR"

      - name: Upgrade source to Arvan Relay 2.6.0
        shell: bash
        run: |
          set -euo pipefail
          python3 - <<'PY'
          import os
          from pathlib import Path

          root = Path(os.environ["PROJECT_DIR"])

          def replace(path, old, new, count=None):
              p = root / path
              text = p.read_text(encoding="utf-8")
              if old not in text:
                  if new in text:
                      return
                  raise SystemExit(f"Expected text not found in {path}: {old[:80]!r}")
              text = text.replace(old, new, -1 if count is None else count)
              p.write_text(text, encoding="utf-8")

          replace(
              "app/build.gradle.kts",
              'versionCode = 27\n        versionName = "2.5.0"',
              'versionCode = 28\n        versionName = "2.6.0"',
          )

          validator = root / "app/src/main/java/ir/smsforwardmanager/network/MahanBotEndpointValidator.kt"
          text = validator.read_text(encoding="utf-8")
          if "DEFAULT_RELAY_URL" not in text:
              text = text.replace(
                  "object MahanBotEndpointValidator {\n",
                  'object MahanBotEndpointValidator {\n    const val DEFAULT_RELAY_URL = "https://otp.mahanvip.ir"\n\n',
                  1,
              )
          text = text.replace(
              "val input = value.trim()\n        if (input.isBlank()) return null",
              "val input = value.trim().ifBlank { DEFAULT_RELAY_URL }",
          )
          validator.write_text(text, encoding="utf-8")

          settings = root / "app/src/main/java/ir/smsforwardmanager/ui/settings/SettingsViewModel.kt"
          text = settings.read_text(encoding="utf-8")
          text = text.replace(
              'val mahanBotEndpoint: String = "",',
              "val mahanBotEndpoint: String = MahanBotEndpointValidator.DEFAULT_RELAY_URL,",
              1,
          )
          text = text.replace(
              "mahanBotEndpoint = settings.mahanBotEndpoint,",
              "mahanBotEndpoint = settings.mahanBotEndpoint.ifBlank { MahanBotEndpointValidator.DEFAULT_RELAY_URL },",
          )
          settings.write_text(text, encoding="utf-8")

          for rel in [
              "app/src/main/java/ir/smsforwardmanager/network/MahanBotOtpForwarder.kt",
              "app/src/main/java/ir/smsforwardmanager/network/MahanBotConnectionTester.kt",
          ]:
              p = root / rel
              text = p.read_text(encoding="utf-8")
              marker = '.header("Accept", "application/json")'
              if '.header("Cache-Control", "no-store")' not in text:
                  text = text.replace(
                      marker,
                      marker + '\n                .header("Cache-Control", "no-store")',
                      1,
                  )
              p.write_text(text, encoding="utf-8")

          remote = root / "app/src/main/java/ir/smsforwardmanager/ui/remote/RemoteAssistScreen.kt"
          text = remote.read_text(encoding="utf-8")
          text = text.replace("import androidx.compose.foundation.layout.weight\n", "")
          remote.write_text(text, encoding="utf-8")

          test_file = root / "app/src/test/java/ir/smsforwardmanager/network/MahanBotEndpointValidatorTest.kt"
          if test_file.exists():
              text = test_file.read_text(encoding="utf-8")
              if "usesArvanRelayAsDefault" not in text:
                  needle = "    @Test\n    fun acceptsHttpsAndRejectsCredentialsOrPublicHttp()"
                  addition = (
                      "    @Test\n"
                      "    fun usesArvanRelayAsDefault() {\n"
                      "        assertEquals(\n"
                      "            \"https://otp.mahanvip.ir/api/v1/sms/otp\",\n"
                      "            MahanBotEndpointValidator.normalize(\"\"),\n"
                      "        )\n"
                      "    }\n\n"
                      "    @Test\n"
                      "    fun acceptsHttpsAndRejectsCredentialsOrPublicHttp()"
                  )
                  text = text.replace(needle, addition, 1)
                  test_file.write_text(text, encoding="utf-8")

          guide = root / "ARVAN_RELAY_SETUP_FA.md"
          guide.write_text(
              "# اتصال OTP از طریق آروان\n\n"
              "نشانی پیش‌فرض اپ: `https://otp.mahanvip.ir`\n\n"
              "اپ فقط کد ملی، OTP، زمان دریافت و شناسه‌های غیرشفاف پیام/دستگاه را ارسال می‌کند.\n"
              "متن کامل پیامک و شماره فرستنده ارسال نمی‌شوند.\n",
              encoding="utf-8",
          )

          print("Arvan relay source upgrade applied")
          PY

          grep -R 'versionName = "2.6.0"' "$PROJECT_DIR/app/build.gradle.kts"
          grep -R 'DEFAULT_RELAY_URL = "https://otp.mahanvip.ir"' "$PROJECT_DIR/app/src/main/java"
          ! grep -R '^import androidx.compose.foundation.layout.weight$' "$PROJECT_DIR/app/src/main/java"

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK API 35
        shell: bash
        run: |
          set -euo pipefail
          SDK_ROOT="${ANDROID_SDK_ROOT:-${ANDROID_HOME:-}}"
          SDKMANAGER="${SDK_ROOT}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          test -n "$SDKMANAGER"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          chmod +x gradlew
          ./gradlew --version

      - name: Build installable debug APK
        shell: bash
        run: |
          set -euo pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon --stacktrace clean :app:assembleDebug 2>&1 | tee "${RUNNER_TEMP}/gradle-build.log"

      - name: Run Android unit tests
        continue-on-error: true
        shell: bash
        run: |
          set -o pipefail
          cd "$PROJECT_DIR"
          ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest 2>&1 | tee "${RUNNER_TEMP}/gradle-tests.log"

      - name: Prepare APK delivery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p delivery
          cp "$PROJECT_DIR/app/build/outputs/apk/debug/app-debug.apk" delivery/SMSForwardManager-2.6.0-ArvanRelay-debug.apk
          sha256sum delivery/*.apk > delivery/SHA256SUMS.txt

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-2.6.0-ArvanRelay-apk
          path: delivery/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Publish source and APK to repository
        shell: bash
        run: |
          set -euo pipefail
          rsync -a --delete \
            --exclude='.git/' \
            --exclude='.github/' \
            --exclude='APK-OUTPUT/' \
            --exclude='.gradle/' \
            --exclude='local.properties' \
            --exclude='**/build/' \
            "$PROJECT_DIR/" ./

          rm -f SMSForwardManager-GitHub-Repository-Ready.zip VERIFY_ACCESS.txt
          mkdir -p APK-OUTPUT
          cp delivery/SMSForwardManager-2.6.0-ArvanRelay-debug.apk APK-OUTPUT/
          cp delivery/SHA256SUMS.txt APK-OUTPUT/

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Publish SMSForwardManager 2.6.0 relay source and APK" || true
          git push origin HEAD:main

      - name: Upload diagnostic logs on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-2.6.0-build-diagnostics
          path: |
            ${{ runner.temp }}/gradle-build.log
            ${{ runner.temp }}/gradle-tests.log
          if-no-files-found: ignore
          retention-days: 7
