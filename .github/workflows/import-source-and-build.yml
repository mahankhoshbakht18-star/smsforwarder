name: Import Source and Build APK

on:
  push:
    branches: [ main ]
    paths:
      - "SMSForwardManager-GitHub-Repository-Ready.zip"
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: smsforwarder-import-build
  cancel-in-progress: false

jobs:
  import-and-build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Verify source archive
        shell: bash
        run: |
          set -euo pipefail
          test -f SMSForwardManager-GitHub-Repository-Ready.zip
          echo "8a6f79e6d4bc243bd6d3ec7fdd8a77fcb5314146baf073f83a10f155a25f5298  SMSForwardManager-GitHub-Repository-Ready.zip" | sha256sum -c -

      - name: Extract and import complete source
        shell: bash
        run: |
          set -euo pipefail
          rm -rf .source-import
          mkdir -p .source-import
          unzip -q SMSForwardManager-GitHub-Repository-Ready.zip -d .source-import
          SOURCE_ROOT=".source-import/SMSForwardManager-GitHub-Repository-Ready"
          test -f "$SOURCE_ROOT/settings.gradle.kts"
          test -f "$SOURCE_ROOT/gradlew"
          test -f "$SOURCE_ROOT/app/build.gradle.kts"
          rsync -a --delete --exclude='.git/' "$SOURCE_ROOT/" ./
          rm -rf .source-import
          chmod +x gradlew

      - name: Commit imported source
        shell: bash
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Import SMSForwardManager 2.5.1 source" || true
          git push origin HEAD:main

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Gradle cache
        uses: gradle/actions/setup-gradle@v4

      - name: Install Android SDK API 35
        shell: bash
        run: |
          set -euo pipefail
          SDKMANAGER="${ANDROID_HOME}/cmdline-tools/latest/bin/sdkmanager"
          if [ ! -x "$SDKMANAGER" ]; then
            SDKMANAGER="$(command -v sdkmanager || true)"
          fi
          test -n "$SDKMANAGER"
          test -x "$SDKMANAGER"
          yes | "$SDKMANAGER" --licenses >/dev/null || true
          "$SDKMANAGER" "platform-tools" "platforms;android-35" "build-tools;35.0.0"

      - name: Validate Gradle wrapper
        shell: bash
        run: |
          set -euo pipefail
          sha256sum gradle/wrapper/gradle-wrapper.jar
          ./gradlew --version

      - name: Run Android unit tests
        run: ./gradlew --no-daemon --stacktrace :app:testDebugUnitTest

      - name: Build installable debug APK
        run: ./gradlew --no-daemon --stacktrace :app:assembleDebug

      - name: Prepare APK delivery
        shell: bash
        run: |
          set -euo pipefail
          mkdir -p delivery
          cp app/build/outputs/apk/debug/app-debug.apk delivery/SMSForwardManager-2.5.1-MahanBot-debug.apk
          sha256sum delivery/*.apk > delivery/SHA256SUMS.txt
          ls -lah delivery

      - name: Upload installable APK
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-2.5.1-installable-apk
          path: delivery/*
          if-no-files-found: error
          retention-days: 30
          compression-level: 0

      - name: Upload build reports on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: SMSForwardManager-build-failure-reports
          path: |
            **/build/reports/**
            **/build/test-results/**
          if-no-files-found: ignore
          retention-days: 7
